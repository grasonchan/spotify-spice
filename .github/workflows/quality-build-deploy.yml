name: Quality & Build & Deploy

on:
  push:
    branches: ['master']
    paths-ignore:
      - 'screenshots/**'
      - 'types/**'
  pull_request:
    branches: ['master']
    paths-ignore:
      - 'screenshots/**'
      - 'types/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-build-deploy:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Event Name: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            HEAD_DATE=$(git show -s --format=%cI "${{ github.event.after }}")
            BASE_SHA=$(gh run list -L 1 -e push -b master -s success --created "<$HEAD_DATE" --json headSha -q '.[0].headSha' -w "${{ github.workflow }}")
            HEAD_SHA="${{ github.event.after }}"
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          echo "DIFF: $BASE_SHA <==> $HEAD_SHA"
          echo "::group::Calculating File Diff"
          RAW_DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          DIFF_FILES=$(echo "$RAW_DIFF_FILES" | grep -vE '^(screenshots/|types/)' || true)
          if [ -n "$DIFF_FILES" ]; then
            {
              echo "DIFF_FILES<<EOF"
              echo "$DIFF_FILES"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "has_files=true" >> $GITHUB_OUTPUT
            if echo "$DIFF_FILES" | grep -qE '^(src/|.*webpack.*\.js$|package.*\.json$)'; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi
          echo "DIFF_FILES:"
          echo "$DIFF_FILES"
          echo "::endgroup::"
      - name: Check restricted files
        if: steps.diff.outputs.has_files == 'true'
        run: |
          DIST_DIR="${{ vars.DIST_DIR }}"
          if echo "$DIFF_FILES" | grep -q "^${DIST_DIR}/"; then
            echo "::error::Do NOT commit the build output ($DIST_DIR/). The CI pipeline will handle this automatically upon merging."
            exit 1
          fi
      - name: Setup Node.js
        if: steps.diff.outputs.has_files == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'npm'
      - name: Install node packages
        if: steps.diff.outputs.has_files == 'true'
        run: |
          npm ci
      - name: Code quality
        if: steps.diff.outputs.has_files == 'true'
        run: |
          EXIST_FILES=$(echo "$DIFF_FILES" | xargs -I {} sh -c 'if [ -f "{}" ]; then echo "{}"; fi')
          if [ -z "$EXIST_FILES" ]; then
            echo "No files to check (all changes are deletions)."
          else
            echo "ESLint..."
            echo "$EXIST_FILES" | xargs npx eslint --no-warn-ignored
            echo "Stylelint..."
            CSS_FILES=$(echo "$EXIST_FILES" | grep '\.css$' || true)
            if [ -n "$CSS_FILES" ]; then
              echo "$CSS_FILES" | xargs npx stylelint
            fi
            echo "$EXIST_FILES" | xargs npx prettier --check -u
          fi
      - name: Build
        if: steps.diff.outputs.should_build == 'true'
        run: |
          npm run build
      - name: Deploy
        if: github.event_name == 'push' && steps.diff.outputs.should_build == 'true'
        run: |
          git fetch origin ${{ github.ref_name }}
          RAW_DIFF_FILES=$(git diff --name-only "${{ github.event.after }}" "origin/${{ github.ref_name }}")
          if echo "$RAW_DIFF_FILES" | grep -qE '^(src/|.*webpack.*\.js$|package.*\.json$)'; then
            echo "::warning::The current distribution is stale! Skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git worktree add "${{ vars.DEPLOY_TARGET }}" "${{ vars.DEPLOY_TARGET }}"
          rm -rf "${{ vars.DEPLOY_TARGET }}/${{ vars.DIST_DIR }}"
          cp -r "${{ vars.DIST_DIR }}" "${{ vars.DEPLOY_TARGET }}"
          cd "${{ vars.DEPLOY_TARGET }}"
          git add "${{ vars.DIST_DIR }}"
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git status
            HEAD_SHORT_SHA=$(git rev-parse --short "${{ github.event.after }}")
            git commit -m "build: update distribution from ${{ github.ref_name }}@$HEAD_SHORT_SHA"
            git push
          fi
